# Scheduled jobs: result sync + deadline reminders, every 15 minutes.
# Hits PRODUCTION by default (override host with the APP_URL repo variable).
# Also hits staging when the STAGING_APP_URL variable is set — staging
# failures don't fail the run.
name: Sync results

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 min (GitHub may delay a few minutes)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    # The `secrets` context isn't allowed in step `if:` — mirror into env
    # and gate on that instead. (An if on secrets.* invalidates the whole
    # file: every push then logs a phantom 0-job failed run and the cron
    # schedule never fires.)
    env:
      PROD_CRON_SECRET: ${{ secrets.PROD_CRON_SECRET }}
      STAGING_CRON_SECRET: ${{ secrets.STAGING_CRON_SECRET }}
      APP_URL: ${{ vars.APP_URL || 'https://epicpickem.com' }}
      STAGING_APP_URL: ${{ vars.STAGING_APP_URL }}
    steps:
      - name: Sync results (production)
        if: env.PROD_CRON_SECRET != ''
        run: |
          curl -fsS --max-time 120 \
            -H "Authorization: Bearer $PROD_CRON_SECRET" \
            "$APP_URL/api/cron/sync"

      - name: Send deadline reminders (production)
        if: env.PROD_CRON_SECRET != ''
        run: |
          curl -fsS --max-time 120 \
            -H "Authorization: Bearer $PROD_CRON_SECRET" \
            "$APP_URL/api/cron/reminders"

      - name: Sync results (staging)
        if: env.STAGING_APP_URL != ''
        continue-on-error: true
        run: |
          curl -fsS --max-time 120 \
            -H "Authorization: Bearer $STAGING_CRON_SECRET" \
            "$STAGING_APP_URL/api/cron/sync"
          curl -fsS --max-time 120 \
            -H "Authorization: Bearer $STAGING_CRON_SECRET" \
            "$STAGING_APP_URL/api/cron/reminders"

      - name: Nothing configured
        if: env.PROD_CRON_SECRET == '' && env.STAGING_APP_URL == ''
        run: |
          echo "No targets: set PROD_CRON_SECRET (secret) for production and/or STAGING_APP_URL (variable) for staging."
