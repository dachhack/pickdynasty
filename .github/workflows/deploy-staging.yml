# Browser-only staging deploy — no local machine or CLI needed, mirroring the
# ffgame deploy-workflow pattern. One-time setup (all in the browser):
#
#   1. supabase.com → New project → copy BOTH connection strings
#      (Settings → Database): pooled (port 6543, add ?pgbouncer=true) and
#      direct (port 5432).
#   2. fly.io dashboard → Account → Access Tokens → create a token.
#   3. GitHub repo → Settings → Secrets and variables → Actions → add:
#        FLY_API_TOKEN          (from step 2)
#        STAGING_DATABASE_URL   (pooled string from step 1)
#        STAGING_DIRECT_URL     (direct string from step 1)
#        STAGING_SESSION_SECRET (any long random string)
#        STAGING_CRON_SECRET    (any long random string)
#      Optional: STAGING_SUPABASE_URL + STAGING_SUPABASE_ANON_KEY to enable
#      Supabase Auth (shared accounts with Drip) — without them staging uses
#      the built-in email/password auth, which is fine for testing.
#      Optional: GIPHY_API_KEY to light up GIF search in chat.
#      Optional: RESEND_API_KEY + EMAIL_FROM (e.g. "Epic Pick'em
#      <commish@epicpickem.com>", domain verified in Resend) to enable
#      invite emails, nudges, and automated deadline reminders.
#   4. Actions tab → "Deploy staging (Fly)" → Run workflow.
#
#   App comes up at https://epicpickem-staging.fly.dev
name: Deploy staging (Fly)

on:
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP: epicpickem-staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Proves the database credentials BEFORE deploying and applies pending
      # migrations from CI. If the URLs/password are wrong, this step fails
      # with the exact Prisma error in plain sight — no Fly-log spelunking.
      - name: Verify database connection & run migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.STAGING_DIRECT_URL }}
        run: npx prisma@6 migrate deploy

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create app if missing
        run: flyctl apps create "$APP" || true

      - name: Set runtime secrets
        run: |
          args=(
            "DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}"
            "DIRECT_URL=${{ secrets.STAGING_DIRECT_URL }}"
            "SESSION_SECRET=${{ secrets.STAGING_SESSION_SECRET }}"
            "CRON_SECRET=${{ secrets.STAGING_CRON_SECRET }}"
          )
          args+=("APP_URL=https://epicpickem-staging.fly.dev")
          if [ -n "${{ secrets.GIPHY_API_KEY }}" ]; then
            args+=("GIPHY_API_KEY=${{ secrets.GIPHY_API_KEY }}")
          fi
          if [ -n "${{ secrets.RESEND_API_KEY }}" ]; then
            args+=("RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}")
          fi
          if [ -n "${{ secrets.EMAIL_FROM }}" ]; then
            args+=("EMAIL_FROM=${{ secrets.EMAIL_FROM }}")
          fi
          if [ -n "${{ secrets.TENOR_API_KEY }}" ]; then
            args+=("TENOR_API_KEY=${{ secrets.TENOR_API_KEY }}")
          fi
          flyctl secrets set --app "$APP" --stage "${args[@]}"

      - name: Deploy
        run: |
          flyctl deploy --app "$APP" --remote-only \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.STAGING_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.STAGING_SUPABASE_ANON_KEY }}"

      - name: Show URL
        run: echo "🌐 https://$APP.fly.dev"
