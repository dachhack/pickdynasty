# Fly config for Epic Pick'em (epicpickem.com).
#
# NOTE: no `app =` line on purpose — the app name is always passed on the
# command line (`fly deploy --app epicpickem` for prod, `--app
# epicpickem-staging` for staging / the GitHub Actions workflow). A hardcoded
# name that mismatches --app makes flyctl drop this config, deploying
# machines with NO http service — the proxy then 502s ("not finding
# machines to route requests").
#
# Secrets first (see DEPLOYMENT.md):
#   fly secrets set DATABASE_URL=... DIRECT_URL=... SESSION_SECRET=... CRON_SECRET=...
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
